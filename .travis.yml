---
language: cpp
sudo: required
dist: bionic
services:
  - docker

env:
  - GO111MODULE=on

jobs:
  include:
    - stage: "Run checks"
      name: "All"
      script: ./ci/checks/all.sh
    - stage: "Build"
      name: "Gcc"
      script: ./ci/builders/gcc/build.sh
    - stage: "Build"
      name: "Clang"
      script: ./ci/builders/clang/build.sh

before_install:
  - sudo chmod -R 777 "$(pwd)"

install:
  - sudo ./ci/docker/docker_files/scripts/installers/install_dependencies.sh
